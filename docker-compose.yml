services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=elk-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=true
      - ELASTIC_PASSWORD=YOUR_PASSWORD_HERE
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - elk-network
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:YOUR_PASSWORD_HERE -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: setup
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    command: >
      bash -c '
        echo "Waiting for Elasticsearch availability";
        until curl -u elastic:YOUR_PASSWORD_HERE http://elasticsearch:9200/_cluster/health; do sleep 30; done;
        echo "Setting kibana_system password";
        until curl -X POST -u elastic:YOUR_PASSWORD_HERE -H "Content-Type: application/json" http://elasticsearch:9200/_security/user/kibana_system/_password -d "{\"password\":\"YOUR_PASSWORD_HERE\"}" ; do sleep 10; done;
        echo "All done!";
      '
    networks:
      - elk-network
    depends_on:
      elasticsearch:
        condition: service_healthy

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: logstash
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro,Z
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro,Z
    ports:
      - "5044:5044"
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "9600:9600"
    environment:
      LS_JAVA_OPTS: "-Xmx512m -Xms512m"
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: YOUR_PASSWORD_HERE
    networks:
      - elk-network
    depends_on:
      setup:
        condition: service_completed_successfully

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: YOUR_PASSWORD_HERE
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: "a7a6311933d3503b89bc2dbc36572c33a6c10925682e591bffcab6911c06786d"
    networks:
      - elk-network
    depends_on:
      setup:
        condition: service_completed_successfully

volumes:
  elasticsearch_data:
    driver: local

networks:
  elk-network:
    driver: bridge
